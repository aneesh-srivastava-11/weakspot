
services:
  postgres:
    image: postgres:16-alpine
    container_name: weakspot-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-weakspot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weakspotpass}
      POSTGRES_DB: ${POSTGRES_DB:-weakspot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weakspot} -d ${POSTGRES_DB:-weakspot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  sidecar:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    image: weakspot-sidecar:local
    container_name: weakspot-sidecar
    restart: always
    environment:
      PORT: 8000
      COGNEE_SKIP_CONNECTION_TEST: "true"
      COGNEE_BASE_URL: "https://tenant-d077aaf8-1a30-4bbb-b053-aeafaaf8f38b.aws.cognee.ai"
      COGNEE_API_KEY: "b14a2e3b8cb219306f5d350552a6c815ee555284c6706040b1d2c319cf5217d6"
    volumes:
      - cognee_data:/root/.cognee
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: weakspot-api:local
    container_name: weakspot-api
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-weakspot}:${POSTGRES_PASSWORD:-weakspotpass}@postgres:5432/${POSTGRES_DB:-weakspot}?schema=public
      SIDECAR_URL: http://sidecar:8000
      PORT: 4000
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      sidecar:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: weakspot-frontend:local
    container_name: weakspot-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - api

volumes:
  pgdata:
    name: weakspot_pgdata
  cognee_data:
    name: weakspot_cognee_data
